---
# Invoked by: labreserve release (manual only)
#
# Extra vars supplied via temp file (-e @file):
#   ansible_password  — the reservation password (used to SSH into the target,
#                       which currently has that password set)
#
# The original password hash was embedded in the revert script when the
# reservation was made.  We read it back from there and restore it directly
# into /etc/shadow via usermod -p, bypassing any need to know the plaintext.

- name: Release lab machine reservation
  hosts: all
  become: true

  tasks:
    - name: Read original password hash from revert script
      ansible.builtin.shell: |
        grep "^ORIGINAL_HASH=" /usr/local/lib/labreserve/revert.sh \
          | sed "s/^ORIGINAL_HASH='//;s/'$//"
      register: original_hash
      changed_when: false
      no_log: true

    - name: Restore original password hash
      ansible.builtin.shell: "usermod -p '{{ original_hash.stdout }}' {{ ansible_user }}"
      no_log: true

    - name: Clear MOTD
      ansible.builtin.copy:
        dest: /etc/motd
        content: "\n"
        owner: root
        group: root
        mode: '0644'

    - name: Clear SSH pre-login banner
      ansible.builtin.copy:
        dest: /etc/issue.net
        content: "\n"
        owner: root
        group: root
        mode: '0644'
      ignore_errors: true

    - name: Remove timed cron entry
      ansible.builtin.file:
        path: /etc/cron.d/labreserve-timed
        state: absent

    - name: Remove reboot cron entry
      ansible.builtin.file:
        path: /etc/cron.d/labreserve-reboot
        state: absent

    - name: Remove revert script
      ansible.builtin.file:
        path: /usr/local/lib/labreserve/revert.sh
        state: absent
