---
# Set the shared account password to the random_password variable supplied
# by the CLI via a temp vars file (-e @file).  The CLI is responsible for
# generating the password so it can store it in the user's personal vault
# and display it — without it ever appearing in a process listing.

- name: Set random password on shared account
  ansible.builtin.user:
    name: "{{ machines[inventory_hostname]['ansible_user'] }}"
    password: "{{ random_password | password_hash('sha512') }}"
    update_password: always
  no_log: true
