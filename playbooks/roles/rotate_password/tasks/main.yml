---
# Set the shared account password to reservation_password, supplied by the
# CLI via a temp vars file (-e @file) so it never appears in the process list.

- name: Set reservation password on shared account
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    password: "{{ reservation_password | password_hash('sha512') }}"
    update_password: always
  no_log: true
